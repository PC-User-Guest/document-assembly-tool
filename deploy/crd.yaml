apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: documentassemblyjobs.assembler.io
spec:
  group: assembler.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                templatePath:
                  type: string
                dataSource:
                  type: string
                outputLocation:
                  type: string
                dataType:
                  type: string
                  enum: [word, csv, json]
            status:
              type: object
              properties:
                state:
                  type: string
                message:
                  type: string
                completionTime:
                  type: string
  scope: Namespaced
  names:
    plural: documentassemblyjobs
    singular: documentassemblyjob
    kind: DocumentAssemblyJob
    shortNames:
      - daj
